version: '3'
services:
  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
